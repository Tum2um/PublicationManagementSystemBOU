<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOU Publication Management System</title>
<style>
  :root{
    --maroon:#651019;
    --maroon-dark:#440a10;
    --maroon-light:#7c1b23;
    --cream:#fdf6ec;
    --card:#ffffff;
    --border:#e9dfcd;
    --gold:#c1912f;
    --gold-dark:#a97b23;
    --text:#2a1c14;
    --muted:#8a7a6a;
    --success:#2f7d4f;
    --success-bg:#eaf5ee;
    --warn:#b3541e;
    --warn-bg:#fbeee2;
    --danger:#a3271f;
    --danger-bg:#fbeae8;
    --info:#2f5f7d;
    --info-bg:#e9f2f6;
    --radius:10px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;background:var(--cream);color:var(--text);}
  h1,h2,h3,h4{font-family:Georgia,"Source Serif Pro",serif;margin:0;font-weight:600;}
  a{color:inherit;}
  button{font-family:inherit;cursor:pointer;}
  ::-webkit-scrollbar{width:9px;height:9px;}
  ::-webkit-scrollbar-thumb{background:#d9cbb0;border-radius:6px;}

  /* ---------- App shell ---------- */
  #app{display:flex;min-height:100vh;}

  /* Sidebar */
  #sidebar{
    width:250px;flex-shrink:0;background:linear-gradient(180deg,var(--maroon) 0%,var(--maroon-dark) 100%);
    color:#f4e9df;display:flex;flex-direction:column;padding:22px 16px;position:sticky;top:0;height:100vh;overflow-y:auto;
  }
  .brand{display:flex;gap:10px;align-items:center;margin-bottom:26px;padding:0 4px;}
  .brand-crest{width:42px;height:42px;flex-shrink:0;object-fit:contain;background:#fff;border:1px solid rgba(193,145,47,.75);border-radius:7px;padding:3px;}
  .brand-text .t1{font-family:Georgia,serif;font-weight:700;font-size:15px;line-height:1.2;color:#fff;}
  .brand-text .t2{font-size:11px;color:#d8b9a2;letter-spacing:.03em;}
  .nav-group-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:#c99a83;margin:16px 8px 6px;font-weight:600;}
  .nav-item{
    display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:#f0e3d7;
    font-size:14px;margin-bottom:2px;cursor:pointer;transition:background .12s;border:none;background:transparent;width:100%;text-align:left;
  }
  .nav-item:hover{background:rgba(255,255,255,.08);}
  .nav-item.active{background:rgba(255,255,255,.16);font-weight:600;color:#fff;}
  .nav-item .ico{width:18px;text-align:center;opacity:.9;font-size:14px;}
  .nav-badge{margin-left:auto;background:var(--gold);color:#3a2a08;font-size:10.5px;font-weight:700;padding:1px 7px;border-radius:10px;}
  .sidebar-footer{margin-top:auto;padding-top:14px;}
  .btn-refresh{
    width:100%;background:var(--gold);border:none;color:#3a2a08;font-weight:700;padding:11px;border-radius:8px;font-size:13.5px;
  }
  .btn-refresh:hover{background:var(--gold-dark);}
  .role-switcher{margin-top:14px;background:rgba(0,0,0,.18);border-radius:8px;padding:10px;}
  .role-switcher label{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:#d8b9a2;display:block;margin-bottom:6px;}
  .role-switcher select{width:100%;padding:7px 8px;border-radius:6px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.08);color:#fff;font-size:13px;}
  .role-switcher select option{color:#222;}

  /* Main */
  #main{flex:1;min-width:0;}
  #topbar{
    display:flex;align-items:center;justify-content:space-between;padding:16px 32px;background:var(--cream);
    border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5;
  }
  .top-left .eyebrow{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--gold-dark);margin-bottom:3px;}
  .top-left h1{font-size:23px;}
  .user-badge{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--border);padding:6px 8px 6px 6px;border-radius:30px;}
  .avatar{width:34px;height:34px;border-radius:50%;background:var(--gold);color:#3a2a08;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;}
  .user-meta .name{font-size:13.5px;font-weight:700;line-height:1.15;}
  .user-meta .role{font-size:11.5px;color:var(--muted);}
  .btn-logout{border:1px solid var(--border);background:#fff;padding:6px 12px;border-radius:20px;font-size:12.5px;font-weight:600;color:var(--maroon);}
  .btn-logout:hover{background:#f4ece0;}

  #content{padding:26px 32px 60px;}

  /* Cards / grid */
  .grid{display:grid;gap:20px;}
  .grid-2{grid-template-columns:1fr 1fr;}
  .grid-3{grid-template-columns:repeat(3,1fr);}
  @media(max-width:1000px){.grid-2,.grid-3{grid-template-columns:1fr;}}
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:22px;}
  .card .eyebrow{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--gold-dark);margin-bottom:5px;}
  .card h2{font-size:19px;margin-bottom:6px;}
  .card .sub{font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.5;}
  .stat-card .stat-num{font-size:34px;font-weight:700;font-family:Georgia,serif;margin:4px 0 2px;}
  .stat-card .stat-label{font-size:12.5px;color:var(--muted);}
  .stat-pill{position:absolute;top:20px;right:20px;background:var(--warn-bg);color:var(--warn);font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;}
  .card.rel{position:relative;}

  /* Form elements */
  label{display:block;font-size:12.5px;font-weight:600;color:#4a3a2c;margin-bottom:5px;}
  .field{margin-bottom:14px;}
  input[type=text],input[type=email],input[type=password],input[type=date],input[type=datetime-local],input[type=number],input[type=file],select,textarea{
    width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:7px;background:#fffaf3;font-size:13.5px;color:var(--text);font-family:inherit;
  }
  textarea{resize:vertical;min-height:70px;}
  select[multiple]{min-height:110px;}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--gold);outline-offset:1px;}
  .row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .hint{font-size:11.5px;color:var(--muted);margin-top:4px;}

  .btn{border:none;border-radius:8px;padding:10px 16px;font-size:13.5px;font-weight:700;display:inline-flex;align-items:center;gap:6px;}
  .btn-primary{background:var(--maroon);color:#fff;width:100%;justify-content:center;padding:12px;}
  .btn-primary:hover{background:var(--maroon-dark);}
  .btn-sm{padding:6px 12px;font-size:12.5px;width:auto;}
  .btn-outline{background:#fff;border:1px solid var(--border);color:var(--text);}
  .btn-outline:hover{background:#f6efe3;}
  .btn-gold{background:var(--gold);color:#3a2a08;}
  .btn-gold:hover{background:var(--gold-dark);}
  .btn-danger-outline{background:#fff;border:1px solid var(--danger);color:var(--danger);}
  .btn-danger-outline:hover{background:var(--danger-bg);}
  .btn-success-outline{background:#fff;border:1px solid var(--success);color:var(--success);}
  .btn-success-outline:hover{background:var(--success-bg);}
  .btn-row{display:flex;gap:8px;flex-wrap:wrap;}

  .empty{border:1px dashed var(--border);border-radius:8px;padding:26px;text-align:center;color:var(--muted);font-size:13px;background:#fffaf3;}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);padding:8px 10px;border-bottom:1px solid var(--border);}
  td{padding:10px 10px;border-bottom:1px solid #f2e9da;vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  .table-wrap{overflow-x:auto;}
  .row-actions{display:flex;gap:6px;flex-wrap:wrap;}

  .badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;}
  .badge-open{background:var(--success-bg);color:var(--success);}
  .badge-closed{background:#efe9e0;color:var(--muted);}
  .badge-draft{background:#efe9e0;color:var(--muted);}
  .badge-pending{background:var(--warn-bg);color:var(--warn);}
  .badge-review{background:var(--info-bg);color:var(--info);}
  .badge-revision{background:var(--warn-bg);color:var(--warn);}
  .badge-published{background:var(--success-bg);color:var(--success);}
  .badge-rejected{background:var(--danger-bg);color:var(--danger);}
  .badge-role{background:#f0e3d3;color:var(--maroon-dark);margin:1px 3px 1px 0;}

  /* Tracking bar */
  .tracker{display:flex;align-items:center;margin:10px 0 4px;}
  .tstep{flex:1;text-align:center;position:relative;}
  .tstep .dot{width:22px;height:22px;border-radius:50%;background:#efe9e0;color:var(--muted);display:flex;align-items:center;justify-content:center;margin:0 auto 6px;font-size:11px;font-weight:700;border:2px solid #efe9e0;}
  .tstep .line{position:absolute;top:10px;left:-50%;width:100%;height:2px;background:#efe9e0;z-index:0;}
  .tstep:first-child .line{display:none;}
  .tstep .label{font-size:10px;color:var(--muted);line-height:1.2;}
  .tstep.done .dot{background:var(--success);border-color:var(--success);color:#fff;}
  .tstep.done .line{background:var(--success);}
  .tstep.current .dot{background:var(--gold);border-color:var(--gold);color:#3a2a08;}
  .tstep.current .label{color:var(--text);font-weight:700;}
  .tstep.blocked .dot{background:var(--danger-bg);border-color:var(--danger);color:var(--danger);}

  /* Nav pills for sub-tabs */
  .subtabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
  .subtab{padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:#fff;font-size:12.5px;font-weight:600;color:var(--muted);}
  .subtab.active{background:var(--maroon);border-color:var(--maroon);color:#fff;}

  /* Toast */
  #toast-wrap{position:fixed;bottom:22px;right:22px;display:flex;flex-direction:column;gap:8px;z-index:999;}
  .toast{background:var(--maroon-dark);color:#fff;padding:12px 18px;border-radius:8px;font-size:13px;box-shadow:0 6px 20px rgba(0,0,0,.2);max-width:340px;animation:slidein .18s ease;}
  .toast.success{background:var(--success);}
  .toast.warn{background:var(--warn);}
  .toast.danger{background:var(--danger);}
  @keyframes slidein{from{transform:translateY(8px);opacity:0;}to{transform:translateY(0);opacity:1;}}

  /* Modal */
  #modal-overlay{position:fixed;inset:0;background:rgba(30,15,10,.45);display:none;align-items:center;justify-content:center;z-index:998;}
  #modal-overlay.show{display:flex;}
  .modal{background:#fff;border-radius:12px;width:460px;max-width:92vw;padding:24px;box-shadow:0 20px 50px rgba(0,0,0,.3);}
  .modal h3{font-size:17px;margin-bottom:10px;}
  .modal .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}
  .modal .role-checkbox-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 12px;margin:8px 0 12px;}
  .modal .role-checkbox-grid label{font-weight:400;font-size:13px;display:flex;align-items:center;gap:6px;}

  .notif-item{display:flex;gap:12px;padding:14px 10px;border-bottom:1px solid #f2e9da;align-items:flex-start;}
  .notif-item:last-child{border-bottom:none;}
  .notif-dot{width:9px;height:9px;border-radius:50%;background:var(--gold);margin-top:6px;flex-shrink:0;}
  .notif-item.read .notif-dot{background:#e2d9c8;}
  .notif-text .msg{font-size:13.5px;}
  .notif-text .meta{font-size:11.5px;color:var(--muted);margin-top:2px;}

  .kv{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px dashed #eee2ce;font-size:13px;}
  .kv:last-child{border-bottom:none;}
  .kv .k{color:var(--muted);}
  .kv .v{font-weight:600;text-align:right;}

  .file-chip{display:flex;align-items:center;gap:8px;background:#fffaf3;border:1px solid var(--border);border-radius:7px;padding:8px 10px;font-size:12.5px;margin-bottom:6px;}
  .file-chip .fico{background:var(--maroon);color:#fff;border-radius:5px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}

  .coauthor-row{display:grid;grid-template-columns:1.2fr 1.2fr .8fr 1fr auto;gap:8px;align-items:end;margin-bottom:8px;}
  @media(max-width:900px){.coauthor-row{grid-template-columns:1fr 1fr;}}
  .link-btn{background:none;border:none;color:var(--maroon);font-weight:700;font-size:12.5px;padding:0;}
  .divider{height:1px;background:var(--border);margin:18px 0;}
  .public-nav{display:flex;justify-content:space-between;align-items:center;padding:16px 32px;background:var(--maroon-dark);color:#fff;}
  .public-nav .btn-outline{background:transparent;border-color:rgba(255,255,255,.4);color:#fff;}
  .paper-card{border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:12px;background:#fff;}
  .paper-card h4{font-size:15px;margin-bottom:4px;}
  .paper-meta{font-size:12px;color:var(--muted);margin-bottom:6px;}
  .center-note{text-align:center;color:var(--muted);font-size:13px;padding:40px 0;}
  .flag-box{background:var(--danger-bg);border:1px solid var(--danger);color:var(--danger);padding:10px 12px;border-radius:8px;font-size:12.5px;margin-bottom:12px;}
  .ok-box{background:var(--success-bg);border:1px solid var(--success);color:var(--success);padding:10px 12px;border-radius:8px;font-size:12.5px;margin-bottom:12px;}

  /* Floating action button */
  .fab-btn{
    position:fixed; right:28px; bottom:28px; z-index:20;
    border:none; border-radius:999px; padding:12px 20px; font-size:14px; font-weight:700;
    background:var(--maroon); color:#fff; box-shadow:0 10px 24px rgba(0,0,0,.2);
    display:inline-flex; align-items:center; gap:8px;
  }
  .fab-btn:hover{background:var(--maroon-dark);}
</style>
</head>

function toast(msg, kind){
  const wrap = document.getElementById('toast-wrap');
  const el = document.createElement('div');
  el.className = 'toast' + (kind ? ' '+kind : '');
  el.textContent = msg;
  wrap.appendChild(el);

}

/* ------------------------------ SHARED WIDGETS ------------------------------- */
function stageBadge(sub){
  if(sub.status.toLowerCase().includes('revision')) return `<span class="badge badge-revision">${sub.status}</span>`;
  if(sub.status==='Published') return `<span class="badge badge-published">Published</span>`;
  if(sub.status.toLowerCase().includes('awaiting')) return `<span class="badge badge-pending">${sub.status}</span>`;
  return `<span class="badge badge-review">${sub.status}</span>`;
}

function trackingBar(sub){
  const revisionFlag = sub.status.toLowerCase().includes('revision');
  let html = '<div class="tracker">';
  STAGES.forEach((label,i)=>{
    let cls = '';
    if(i < sub.stage) cls='done';
    else if(i === sub.stage) cls = revisionFlag ? 'blocked' : 'current';
    html += `<div class="tstep ${cls}"><div class="line"></div><div class="dot">${i<sub.stage?'&#10003;':(i+1)}</div><div class="label">${label}</div></div>`;
  });
  html += '</div>';
  if(revisionFlag){
    html += `<div class="hint" style="color:var(--warn);margin-top:4px;">&#9888; Revision requested at "${STAGES[sub.stage]}" — author must resubmit to continue.</div>`;
  }
  return html;
}

function callOptions(onlyOpen){
  return DB.calls.filter(c=> onlyOpen? c.status==='Published' : true)

}

function createUser(){
  const name = document.getElementById('newName').value.trim();
  const email = document.getElementById('newEmail').value.trim();
  const pass = document.getElementById('newPass').value.trim();
  const checks = document.querySelectorAll('#modal-box .role-checkbox-grid input[type=checkbox]:checked');
  const roles = Array.from(checks).map(cb=>cb.value);
  if(!name || !email){ toast('Full name and email are required.','warn'); return; }
  if(roles.length===0){ toast('Select at least one role.','warn'); return; }
  const id = 'u'+(ID.user++);
  DB.users.push({id, name, email, roles, status:'Active'});
  DB.auditLog.unshift({id:ID.audit++, user:currentUser().name, action:`Created account for ${name} (${roles.map(r=>ROLE_LABEL[r]).join(', ')})`, date:'15 Jul 2026', outcome:'Success'});
  toast('Account created for '+name+'. Temporary password: '+pass,'success');
  go('admin-users');
}

function renderReviewerOptions(){
  const type = document.getElementById('assignType').value;
  const list = type==='Internal' ? usersByRole('InternalReviewer') : usersByRole('ExternalReviewer');
  document.getElementById('assignReviewer').innerHTML = list.map(u=>`<option value="${u.id}">${u.name} (${u.email})</option>`).join('') || '<option>No reviewers of this type</option>';
  checkCOI();
}
function checkCOI(){
  const subId = document.getElementById('assignSub').value;
  const revId = document.getElementById('assignReviewer').value;
  const box = document.getElementById('coiWarning');
  if(!subId || !revId){ box.innerHTML=''; return; }
  const sub = subById(Number(subId));
  const rev = DB.users.find(u=>u.id===revId);
  const emails = [sub.corresponding.email, ...sub.coAuthors.map(a=>a.email)];
  if(rev && emails.includes(rev.email)){
    box.innerHTML = `<div class="flag-box">&#9888; Conflict of interest: ${rev.name}'s e-mail matches an author on this submission (FR-7.7). Choose a different reviewer.</div>`;
  } else {
    box.innerHTML = `<div class="ok-box">&#10003; No conflict of interest detected against author/co-author e-mails.</div>`;
  }
}
document.addEventListener('change', (e)=>{
  if(e.target && (e.target.id==='assignSub' || e.target.id==='assignReviewer')) checkCOI();
});
function assignReviewer(){
  const subId = Number(document.getElementById('assignSub').value);
  const type = document.getElementById('assignType').value;
  const revId = document.getElementById('assignReviewer').value;
  if(!subId || !revId){ toast('Select a submission and reviewer.','warn'); return; }
  const sub = subById(subId);
  const rev = DB.users.find(u=>u.id===revId);
  const emails = [sub.corresponding.email, ...sub.coAuthors.map(a=>a.email)];
  const coi = emails.includes(rev.email);
  if(coi){ toast('Cannot assign — conflict of interest detected.','danger'); return; }
  const assignment = {id:ID.assign++, submissionId:subId, reviewerId:revId, type, status:'Pending Editorial Board verification', assignedBy:state.userId, coi:false};
  DB.assignments.push(assignment);
  DB.ebQueue.push({id:ID.eb++, kind:`${type} reviewer assignment`, submissionId:subId, refId:assignment.id, status:'Pending'});
  sub.status = 'Awaiting Editorial Board verification of reviewer assignment';
  notify(usersByRole('EditorialBoard').map(u=>u.id), `${type} reviewer assignment for "${sub.title}" is awaiting your verification.`);
  DB.auditLog.unshift({id:ID.audit++, user:currentUser().name, action:`Assigned ${type} reviewer (${rev.name}) — ${sub.title}`, date:'15 Jul 2026', outcome:'Success'});
  toast('Sent to Editorial Board for verification.','success');
  go('ro-assign');
}

function verifyComment(cid, approve){
  const c = DB.comments.find(x=>x.id===cid);
  const a = DB.assignments.find(x=>x.id===c.assignmentId);
  const sub = subById(a.submissionId);
  if(approve){
    c.verified = true;
    DB.auditLog.unshift({id:ID.audit++, user:currentUser().name, action:`Verified ${a.type.toLowerCase()} reviewer comments — ${sub.title}`, date:'15 Jul 2026', outcome:'Success'});
    if(c.recommendation==='Accept'){
      if(a.type==='Internal'){ sub.status = 'Awaiting officer review / reviewer assignment'; }
      else { sub.status = 'Awaiting Editorial Board final verification'; }
      notify([sub.corresponding.email===currentUser().email?state.userId:'u6'], `Reviewer comments verified for "${sub.title}".`);
    } else {
      sub.status = 'Revision requested';
      notify(DB.users.filter(u=>u.email===sub.corresponding.email).map(u=>u.id), `Reviewer comments are available for "${sub.title}" — ${c.recommendation.toLowerCase()} requested.`);
    }
    toast('Comments verified.','success');
  } else {
    reasonModal('Return comments to reviewer', (reason)=>{
      notify([a.reviewerId], `Your comments on "${sub.title}" were returned by the Research Officer: ${reason}`);
      toast('Sent back to reviewer for correction.','warn');
      go('ro-verify');

  go('ro-verify');
}
function verifyRevision(subId, approve){
  const sub = subById(subId);

}

/* =========================================================================
   EDITORIAL BOARD PAGES
   ========================================================================= */
function renderEbQueueTable(items){
  if(!items.length) return emptyBox('No assignments found.');
  return `<div class="table-wrap"><table><thead><tr><th>Kind</th><th>Submission</th><th>Status</th></tr></thead><tbody>
    ${items.map(e=>`<tr><td>${e.kind}</td><td>${subById(e.submissionId).title}</td><td><span class="badge badge-pending">${e.status}</span></td></tr>`).join('')}
  </tbody></table></div>`;
}
function pageEbVerify(){
  const pending = DB.ebQueue.filter(e=>e.status==='Pending');
  const officerApprovals = DB.submissions.filter(s=>s.status==='Awaiting Editorial Board final verification');
  return `
  <div class="grid grid-2">
    <div class="card">
      <div class="eyebrow">Verification queue</div>
      <h2>Reviewer assignments</h2>
      <div class="sub">Verify the Research Officer's internal / external reviewer assignment before the reviewer can begin (per process flow).</div>
      ${pending.map(e=>`
        <div style="padding:12px 0;border-bottom:1px solid #f2e9da;">
          <strong style="font-size:13.5px;">${e.kind}</strong> — ${subById(e.submissionId).title}
          <div class="btn-row" style="margin-top:8px;">
            <button class="btn btn-success-outline btn-sm" onclick="ebVerifyAssignment(${e.id}, true)">Approve</button>
            <button class="btn btn-danger-outline btn-sm" onclick="ebVerifyAssignment(${e.id}, false)">Return with reason</button>
          </div>
        </div>`).join('') || emptyBox('No reviewer assignments pending verification.')}
    </div>
    <div class="card">
      <div class="eyebrow">Verification queue</div>
      <h2>Officer's approval</h2>
      <div class="sub">Verify the Research Officer's overall approval of a submission at this checkpoint.</div>
      ${officerApprovals.map(s=>`
        <div style="padding:12px 0;border-bottom:1px solid #f2e9da;">
          <strong style="font-size:13.5px;">${s.title}</strong>
          <div class="btn-row" style="margin-top:8px;">
            <button class="btn btn-success-outline btn-sm" onclick="ebVerifyOfficerApproval(${s.id}, true)">Approve</button>
            <button class="btn btn-danger-outline btn-sm" onclick="ebVerifyOfficerApproval(${s.id}, false)">Return with reason</button>
          </div>
        </div>`).join('') || emptyBox('No officer approvals pending verification.')}
    </div>
  </div>`;
}
function ebVerifyAssignment(eid, approve){
  const e = DB.ebQueue.find(x=>x.id===eid);
  const a = DB.assignments.find(x=>x.id===e.refId);
  const sub = subById(e.submissionId);
  if(approve){
    e.status='Verified'; a.status='Active';
    sub.status = `Awaiting ${a.type.toLowerCase()} reviewer comments`;
    notify([a.reviewerId], `You have been assigned to review "${sub.title}".`);
    DB.auditLog.unshift({id:ID.audit++, user:currentUser().name, action:`Approved ${e.kind} — ${sub.title}`, date:'15 Jul 2026', outcome:'Success'});
    toast('Assignment approved — reviewer notified.','success');
    go('eb-verify');
  } else {
    reasonModal('Return assignment to Research Officer', (reason)=>{
      e.status='Returned';
      sub.status = 'Awaiting officer review / reviewer assignment';
      notify(usersByRole('ResearchOfficer').map(u=>u.id), `${e.kind} for "${sub.title}" was returned by the Editorial Board: ${reason}`);
      toast('Sent back to Research Officer.','warn');
      go('eb-verify');
    });
  }
}
function ebVerifyOfficerApproval(subId, approve){
  const sub = subById(subId);
  if(approve){
    sub.status = 'Ready for final Editorial Board approval';
    toast('Officer approval verified. Ready for final publishing decision.','success');
  } else {
    reasonModal('Return to Research Officer', (reason)=>{
      notify(usersByRole('ResearchOfficer').map(u=>u.id), `Approval for "${sub.title}" was returned: ${reason}`);
      toast('Returned to Research Officer.','warn');
      go('eb-verify');
    });
    return;
  }
  go('eb-verify');
}
function pageEbPublish(){
  const ready = DB.submissions.filter(s=>s.status==='Ready for final Editorial Board approval');
  return `
  <div class="card">
    <div class="eyebrow">Final stage</div>
    <h2>Approve for publishing</h2>
    <div class="sub">Confirms that all required stages (internal review, revisions, external review) are complete, per FR-8.2 / FR-8.3.</div>
    ${ready.map(s=>`
      <div style="padding:14px 0;border-bottom:1px solid #f2e9da;">
        <strong style="font-size:14px;">${s.title}</strong>
        <div class="hint">Corresponding author: ${s.corresponding.name} · Theme: ${s.theme}</div>
        <div class="btn-row" style="margin-top:8px;">
          <button class="btn btn-success-outline btn-sm" onclick="approvePublish(${s.id})">Approve for publishing</button>
          <button class="btn btn-danger-outline btn-sm" onclick="rejectPublish(${s.id})">Reject with reason</button>
        </div>
      </div>`).join('') || emptyBox('No submissions ready for final approval.')}
  </div>`;
}
function approvePublish(subId){
  const sub = subById(subId);
  sub.status='Published'; sub.stage=4;
  sub.pubRef = 'BOU-WP-2026-0'+subId;
  sub.pubDate = '15 Jul 2026';
  sub.history.push('Published 15 Jul 2026');
  notify(DB.users.filter(u=>u.email===sub.corresponding.email).map(u=>u.id), `"${sub.title}" has been published as ${sub.pubRef}.`);
  DB.auditLog.unshift({id:ID.audit++, user:currentUser().name, action:`Approved for publishing — ${sub.title} (${sub.pubRef})`, date:'15 Jul 2026', outcome:'Success'});
  toast('Published! Now visible in the public repository.','success');
  go('eb-publish');
}
function rejectPublish(subId){
  const sub = subById(subId);
  reasonModal('Reject and return', (reason)=>{
    sub.status = 'Awaiting officer review / reviewer assignment';
    notify(usersByRole('ResearchOfficer').map(u=>u.id), `Final publishing of "${sub.title}" was rejected: ${reason}`);
    toast('Returned to Research Officer.','warn');
    go('eb-publish');
  });
}

/* =========================================================================
   REVIEWER PAGES
   ========================================================================= */
function renderAssignmentTable(list, withActions){
  return `<div class="table-wrap"><table><thead><tr><th>Paper</th><th>Type</th><th>Status</th>${withActions?'<th></th>':''}</tr></thead><tbody>
    ${list.map(a=>`<tr><td>${subById(a.submissionId).title}</td><td>${a.type}</td>
      <td>${a.status==='Active'?'<span class="badge badge-pending">Awaiting your review</span>':'<span class="badge badge-review">'+a.status+'</span>'}</td>
      ${withActions?`<td>${a.status==='Active'?`<button class="btn btn-outline btn-sm" onclick="openReviewForm(${a.id})">Review</button>`:'—'}</td>`:''}
    </tr>`).join('')}
  </tbody></table></div>`;
}
function pageReviewerAssignments(role){
  const mine = DB.assignments.filter(a=>a.reviewerId===state.userId);
  return `
  <div class="card">
    <div class="eyebrow">Review workspace</div>
    <h2>My assignments</h2>
    <div class="sub">Papers assigned to you together with the standard Reviewer Comments Template and Reviewer Guidelines (FR-6.3 / FR-7.4).</div>
    <div class="btn-row" style="margin-bottom:14px;">
      <button class="btn btn-outline btn-sm" onclick="toast('Downloading Reviewer_Comments_Template_v2.docx (demo only)')">Download comment template</button>

    <div id="reviewFormSlot"></div>
  </div>`;
}
function openReviewForm(aid){
  const a = DB.assignments.find(x=>x.id===aid);
  const sub = subById(a.submissionId);
  document.getElementById('reviewFormSlot').innerHTML = `
    <div class="divider"></div>
    <h3 style="font-size:15px;margin-bottom:10px;">Submit review — ${sub.title}</h3>
    <div class="field">
      <label>Recommendation</label>
      <select id="recSelect">
        <option>Accept</option><option>Minor Revision</option><option>Major Revision</option><option>Reject</option>
      </select>
    </div>
    <div class="field"><label>Comments (using the standard template)</label><textarea id="revComments" placeholder="Enter your review comments..."></textarea></div>
    <button class="btn btn-primary" onclick="submitReview(${aid})">Submit comments to Research Officer</button>
  `;
}
function submitReview(aid){
  const a = DB.assignments.find(x=>x.id===aid);
  const sub = subById(a.submissionId);
  const rec = document.getElementById('recSelect').value;
  const text = document.getElementById('revComments').value.trim();
  if(!text){ toast('Please enter your comments.','warn'); return; }
  DB.comments.push({id:ID.comment++, assignmentId:aid, recommendation:rec, text, submittedAt:'15 Jul 2026', verified:false});
  a.status = 'Comments submitted — pending officer verification';
  sub.status = `${a.type} reviewer comments submitted — pending officer verification`;
  notify(usersByRole('ResearchOfficer').map(u=>u.id), `${currentUser().name} submitted comments for "${sub.title}".`);
  DB.auditLog.unshift({id:ID.audit++, user:currentUser().name, action:`Submitted review comments — ${sub.title} (${rec})`, date:'15 Jul 2026', outcome:'Success'});
  toast('Comments submitted for officer verification.','success');
  go('rev-assignments');
}

/* =========================================================================
   AUTHOR PAGES
   ========================================================================= */
let coauthorCount = 0;
function pageAuthorSubmit(){
  coauthorCount = 0;
  const u = currentUser();
  return `
  <div class="grid grid-2">
    <div class="card">
      <div class="eyebrow">Submission</div>
      <h2>Submit abstract or working paper idea</h2>
      <div class="sub">The corresponding author is the logged-in author. Add co-authors and their institutions or BOU departments.</div>
      <div class="field">
        <label>Call</label>
        <select id="subCall" onchange="populateThemes()">
          <option value="">Select a published call</option>
          ${callOptions(true)}
        </select>
      </div>
      <div class="field">
        <label>Theme</label>
        <select id="subTheme"><option value="">Select a call first</option></select>
      </div>
      <div class="field"><label>Title</label><input id="subTitle" type="text" placeholder="Enter the abstract or working paper title"></div>
      <div class="field">
        <label>Authors</label>
        <div class="hint" style="margin-bottom:8px;">First row is the corresponding author (you).</div>
        <div class="coauthor-row">
          <div><label style="font-weight:400;font-size:11px;">Name</label><input type="text" value="${u.name}" disabled></div>
          <div><label style="font-weight:400;font-size:11px;">Email</label><input type="text" value="${u.email}" disabled></div>
          <div><label style="font-weight:400;font-size:11px;">BOU staff?</label><input type="text" value="Yes" disabled></div>
          <div><label style="font-weight:400;font-size:11px;">Department / Institution</label><input type="text" value="Research Department" disabled></div>
          <div></div>
        </div>
        <div id="coauthorRows"></div>
        <button class="link-btn" onclick="addCoauthorRow()">+ Add co-author</button>
      </div>
      <div class="field">
        <label>Upload documents</label>
        <div class="file-chip"><div class="fico">DOC</div><div style="flex:1;">Abstract document<input type="file" style="border:none;padding:2px 0;"></div></div>
        <div class="file-chip"><div class="fico">DOC</div><div style="flex:1;">Complete working paper (enabled once the paper stage of the call is open)<input type="file" style="border:none;padding:2px 0;"></div></div>
        <div class="hint">Accepted types: .docx, .pdf — max 20MB (FR-4.8).</div>
      </div>
      <div class="btn-row">
        <button class="btn btn-outline" onclick="saveDraftSubmission()">Save as draft</button>
        <button class="btn btn-primary" onclick="submitAuthorPaper()">Submit to Research Department</button>
      </div>
    </div>
    <div class="card">
      <div class="eyebrow">Guidance</div>
      <h2>Before you submit</h2>
      <div class="kv"><div class="k">Approved file types</div><div class="v">.docx, .pdf</div></div>
      <div class="kv"><div class="k">Max file size</div><div class="v">20 MB</div></div>
      <div class="kv"><div class="k">Co-authors</div><div class="v">Unlimited, each needs a valid e-mail</div></div>
      <div class="kv"><div class="k">Multiple submissions per call</div><div class="v">Allowed</div></div>
      <div class="divider"></div>
      <div class="hint">Once finalised, you'll get an on-screen acknowledgement and a confirmation notification (FR-4.11). You can also save your work as a draft and finish later, before the deadline (FR-4.10).</div>
    </div>
  </div>`;
}
function populateThemes(){
  const callId = Number(document.getElementById('subCall').value);
  const sel = document.getElementById('subTheme');
  if(!callId){ sel.innerHTML='<option value="">Select a call first</option>'; return; }
  const call = callById(callId);
  sel.innerHTML = call.themes.map(t=>`<option value="${t}">${t}</option>`).join('');
}
function addCoauthorRow(){
  coauthorCount++;
  const id = coauthorCount;
  const wrap = document.getElementById('coauthorRows');
  const div = document.createElement('div');
  div.className='coauthor-row';
  div.id = 'coauthor-'+id;
  div.innerHTML = `
    <div><input type="text" placeholder="Full name" id="ca-name-${id}"></div>
    <div><input type="email" placeholder="Email" id="ca-email-${id}"></div>
    <div><select id="ca-staff-${id}" onchange="toggleCoauthorDept(${id})"><option value="Yes">Yes</option><option value="No">No</option></select></div>
    <div id="ca-dept-wrap-${id}"><select id="ca-dept-${id}">${DB.departments.map(d=>`<option>${d.name}</option>`).join('')}</select></div>
    <div><button class="btn btn-danger-outline btn-sm" onclick="document.getElementById('coauthor-${id}').remove()">Remove</button></div>
  `;
  wrap.appendChild(div);
}
function toggleCoauthorDept(id){
  const staff = document.getElementById('ca-staff-'+id).value;
  const wrap = document.getElementById('ca-dept-wrap-'+id);
  if(staff==='Yes'){
    wrap.innerHTML = `<select id="ca-dept-${id}">${DB.departments.map(d=>`<option>${d.name}</option>`).join('')}</select>`;
  } else {
    wrap.innerHTML = `<input type="text" id="ca-dept-${id}" placeholder="Institution name">`;
  }
}
function collectCoauthors(){
  const rows = document.querySelectorAll('#coauthorRows .coauthor-row');
  const out = [];
  rows.forEach(r=>{
    const id = r.id.split('-')[1];
    const name = document.getElementById('ca-name-'+id).value.trim();
    const email = document.getElementById('ca-email-'+id).value.trim();
    const staff = document.getElementById('ca-staff-'+id).value==='Yes';
    const deptEl = document.getElementById('ca-dept-'+id);
    const dept = deptEl ? deptEl.value : '';
    if(name) out.push({name, email, staff, dept});
  });
  return out;
}
function saveDraftSubmission(){ toast('Draft saved. You can finish this submission later, before the deadline.','success'); }
function submitAuthorPaper(){
  const callId = Number(document.getElementById('subCall').value);
  const theme = document.getElementById('subTheme').value;
  const title = document.getElementById('subTitle').value.trim();
  if(!callId || !theme || !title){ toast('Select a call, theme, and enter a title.','warn'); return; }
  const u = currentUser();
  const coAuthors = collectCoauthors();
  const sub = {
    id: ID.sub++, callId, theme, title,
    corresponding:{name:u.name, email:u.email},
    coAuthors: coAuthors.map(c=>({name:c.name, email:c.email, staff:c.staff, dept:c.dept})),
    stage:0, status:'Awaiting officer review / reviewer assignment', pubRef:null, pubDate:null,
    docs:[{type:'Abstract', v:1}],
    history:['Submitted 15 Jul 2026']
  };
  DB.submissions.push(sub);
  notify([state.userId], `Your submission "${title}" has been received.`);
  notify(usersByRole('ResearchOfficer').map(x=>x.id), `New submission received: "${title}".`);
  DB.auditLog.unshift({id:ID.audit++, user:u.name, action:`Submitted abstract — ${title}`, date:'15 Jul 2026', outcome:'Success'});
  toast('Submitted! A confirmation notification has been sent.','success');
  go('author-mysubs');
}

function pageAuthorSubs(){
  const u = currentUser();
  const mine = DB.submissions.filter(s=>s.corresponding.email===u.email);
  return `
  <div class="card">
    <div class="eyebrow">Tracking</div>
    <h2>My submissions</h2>
    <div class="sub">Visual progress for each submission, from Submitted through to Published (FR-5.1).</div>
    ${mine.map(s=>`
      <div style="padding:16px 0;border-bottom:1px solid #f2e9da;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <strong style="font-size:14.5px;">${s.title}</strong>${stageBadge(s)}
        </div>
        <div class="hint">Call FY ${callById(s.callId)?callById(s.callId).fy:'—'} · Theme: ${s.theme}</div>
        ${trackingBar(s)}
        <div class="btn-row" style="margin-top:8px;">
          <button class="btn btn-outline btn-sm" onclick="viewSubmissionHistory(${s.id})">View history</button>
          ${s.status==='Revision requested'?`<button class="btn btn-primary btn-sm" style="width:auto" onclick="openRevisionForm(${s.id})">Submit revised paper</button>`:''}
        </div>
      </div>`).join('') || emptyBox('No submissions found.')}
  </div>`;
}
function viewSubmissionHistory(subId){
  const s = subById(subId);
  openModal(`
    <h3>${s.title}</h3>
    <div class="hint" style="margin-bottom:10px;">Full history for this submission.</div>
    ${s.history.map(h=>`<div style="font-size:13px;padding:6px 0;border-bottom:1px dashed #eee2ce;">${h}</div>`).join('')}
    <div class="modal-actions"><button class="btn btn-outline btn-sm" onclick="closeModal()">Close</button></div>
  `);
}
function openRevisionForm(subId){
  const s = subById(subId);
  const relatedComment = DB.comments.find(c=>{ const a=DB.assignments.find(x=>x.id===c.assignmentId); return a && a.submissionId===subId; });
  openModal(`
    <h3>Submit revised working paper</h3>
    <div class="hint" style="margin-bottom:10px;">${relatedComment? 'Reviewer feedback: '+relatedComment.text : 'Please address reviewer feedback and re-upload your paper.'}</div>
    <div class="field"><label>Revised working paper file</label><input type="file"></div>
    <div class="field"><label>Note to reviewers (optional)</label><textarea placeholder="Summarise the changes made..."></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-outline btn-sm" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary btn-sm" style="width:auto" onclick="submitRevision(${subId})">Submit revision</button>
    </div>
  `);
}
function submitRevision(subId){
  const s = subById(subId);
  s.docs.push({type:'Revised Working Paper', v:(s.docs.length+1)});
  s.status = 'Revised paper submitted — pending officer verification';
  s.history.push('Revised paper submitted 15 Jul 2026');
  notify(usersByRole('ResearchOfficer').map(u=>u.id), `Revised working paper submitted for "${s.title}".`);
  DB.auditLog.unshift({id:ID.audit++, user:currentUser().name, action:`Submitted revised working paper — ${s.title}`, date:'15 Jul 2026', outcome:'Success'});
  closeModal();
  toast('Revised paper submitted for officer verification.','success');
  go('author-mysubs');
}

}
function pageNotifications(){
  const mine = DB.notifications.filter(n=>n.userId===state.userId);
  return `
  <div class="card">

function markAllRead(){
